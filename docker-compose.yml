services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: sh -c "pnpm install && pnpm --filter @medchain/web dev"
    ports:
      - "3000:3000"
    env_file:
      - path: apps/web/.env.local
        required: false
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=public
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - mobile_node_modules:/workspace/apps/mobile/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mobile:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: sh -c "pnpm install && pnpm --filter @medchain/mobile dev -- --host lan"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    env_file:
      - path: apps/mobile/.env.local
        required: false
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - mobile_node_modules:/workspace/apps/mobile/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

volumes:
  root_node_modules:
  web_node_modules:
  mobile_node_modules:
